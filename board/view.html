<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>San San Project - List</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown.min.css" rel="stylesheet">
  <link href="/assets/css/style.css" rel="stylesheet">

  <style>
    #post-content {
      line-height: 1.6;     
      font-size: 1.1rem;    
      white-space: pre-wrap; 
      word-break: break-all; 
      color: #333;
    }
  </style>

</head>

<body class="bg-light">

<div id="topbar"></div>

<div class="d-flex">
  <div id="sidebar"></div>

  <main class="flex-grow-1 p-4">
    <div class="container bg-white shadow-sm rounded p-4" style="max-width: 900px;">

      <div id="view-header" class="mb-4">
        <h2 id="post-title" class="fw-bold mb-2 text-dark">로딩 중...</h2>
        <div class="text-secondary">
          <span id="post-author" class="me-3"><i class="bi bi-person"></i> </span>
          <span id="post-date"><i class="bi bi-calendar-event"></i> </span>
        </div>
      </div>
      <hr>

      <div id="post-content" class="p-3 border rounded bg-white">
        내용을 불러오고 있습니다...
      </div>
      <hr>

      <div class="d-flex justify-content-between">
        <a href="/board/list.html" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left"></i> 목록으로
        </a>
        <div>
          <button class="btn btn-outline-danger" onclick="deletePost()">삭제</button>
        </div>
      </div>

    </div>
  </main>
</div>      

<script>
fetch("/topbar.html")
  .then(res => res.text())
  .then(html => {
    document.getElementById("topbar").innerHTML = html;
  });

fetch("/sidebar.html")
  .then(res => res.text())
  .then(html => {
    const sidebar = document.getElementById("sidebar");
    sidebar.innerHTML = html;

    document.querySelectorAll('.nav-link').forEach(link => {
      if (link.getAttribute("href") === location.pathname.split('/').pop()) {
        link.classList.add('active');
      }
    });
  });
</script>  

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const issueNumber = urlParams.get('id');

  async function loadDetail() {
    if (!issueNumber) {
        alert("잘못된 접근입니다.");
        location.href = "/board/list.html";
        return;
    }

    try {
      // 2. 해당 번호의 이슈 데이터만 가져오기
      const response = await fetch(`https://api.github.com/repos/teata99/site82/issues/${issueNumber}`);
      const post = await response.json();

      if (!response.ok) throw new Error("글을 찾을 수 없습니다.");

      document.getElementById('post-title').innerText = post.title;
      document.getElementById('post-author').innerText = post.user.login;
      document.getElementById('post-date').innerText = new Date(post.created_at).toLocaleString();
      console.log(post.body);
      document.getElementById('post-content').innerText = post.body || "";

    } catch(error) {
        console.error(error);
        document.getElementById('post-content').innerText = "데이터를 불러오는 데 실패했습니다.";
    }
  }

  async function deletePost() {
    if (!confirm("정말 이 게시글을 삭제하시겠습니까?")) {
        return;
    }

    const deleteBtn = document.querySelector('button.btn-outline-danger');
    deleteBtn.disabled = true;
    deleteBtn.innerText = "삭제 중...";

    try {
        const response = await fetch('https://site82.netlify.app/.netlify/functions/delete-post', {
            method: 'POST',
            body: JSON.stringify({ issueNumber: issueNumber })
        });

        if (response.ok) {
            alert("게시글이 삭제되었습니다.");
            location.href = "list.html"; 
        } else {
            const errData = await response.json();
            alert("삭제 실패: " + (errData.message || "권한이 없습니다."));
        }

    } catch (error) {
        console.error("삭제 중 에러:", error);
        alert("통신 에러가 발생했습니다.");
        
    } finally {
        deleteBtn.disabled = false;
        deleteBtn.innerText = "삭제";
    }


  }

  window.onload = loadDetail;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
